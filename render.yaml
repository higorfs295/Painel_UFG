# Blueprint do Render (https://render.com/docs/blueprint-spec) — backend no plano FREE.
# Banco: use o Neon (tier gratuito permanente com pooler embutido) em vez do Postgres do
# Render (que expira em ~30 dias no free). Passo a passo completo em docs/DEPLOY.md.
#
# Variáveis marcadas com `sync: false` são preenchidas no dashboard na primeira sincronização:
#   DATABASE_URL -> string POOLED do Neon (…-pooler…/painel?sslmode=require&pgbouncer=true)
#   DIRECT_URL   -> string DIRETA do Neon (sem -pooler) — usada pelas migrações
#   APP_URL      -> URL do frontend na Vercel (ex.: https://painel.vercel.app)
#   CORS_ORIGIN  -> mesma URL (ou lista separada por vírgula com os previews)
services:
  - type: web
    name: painel-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SAMESITE
        value: none          # frontend (Vercel) e API (Render) são origens diferentes
      - key: TRUST_PROXY
        value: "true"
      # Namespace duplo. Aqui frontend (Vercel) e API (Render) são origens DIFERENTES,
      # então não há colisão de caminhos e o alias é dispensável — mas manter "/api"
      # custa pouco e deixa a API acessível pelos dois caminhos. "" desliga.
      - key: API_ALIAS_PREFIX
        value: "/api"
      # Cifra de campo (AES-256-GCM) para PII em repouso — a matrícula. Gere com:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      # Sem ela o sistema funciona, mas a matrícula fica em claro no banco.
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      # Cadastro público. "false" fecha a instância (só convite do admin).
      - key: ALLOW_REGISTRATION
        value: "true"
      # OpenAPI em /docs já desliga sozinha em produção; explícito para não depender só disso.
      - key: DOCS_ENABLED
        value: "false"
      - key: DEV_TOOLS
        value: "false"
      # E-mail (RF-18). O plano FREE do Render bloqueia saída nas portas 25/465/587
      # (desde 26/09/2025) — use a 2525 do provedor. Sem SMTP_HOST o sistema cai no
      # modo manual: o link de convite/reset é devolvido ao admin na tela.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "2525"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
