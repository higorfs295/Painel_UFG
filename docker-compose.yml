# Stack completa: Postgres + API (Fastify) + Web (Next.js standalone) + Caddy (TLS + proxy).
# Requer o plugin Docker Compose v2 (`docker compose ...`). Variáveis em .env (veja .env.example).
#
# Subir só o banco (fluxo de dev, backend/front rodando no host):
#   docker compose up -d db
# Subir a stack inteira:
#   JWT_SECRET=... docker compose up --build
# Semear (uma vez, após a stack no ar):
#   docker compose run --rm -e SEED_ADMIN_PASSWORD=... api node dist/seed/seed.js
#   (a imagem é buildada: só existe dist/, não src/)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: painel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-painel}
      POSTGRES_DB: painel
    # Publicado só por conveniência (conectar um cliente SQL); a API fala com o banco pela
    # rede interna do compose. Quem já tem um Postgres na 5432 — situação comum — sobe com
    # `DB_PORT=55432 docker compose up`, senão o Docker recusa a porta. Em produção, remova.
    ports: ["${DB_PORT:-5432}:5432"]
    volumes: [dbdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U painel -d painel"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://painel:${POSTGRES_PASSWORD:-painel}@db:5432/painel?schema=public
      DIRECT_URL: postgresql://painel:${POSTGRES_PASSWORD:-painel}@db:5432/painel?schema=public
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      APP_URL: ${APP_URL:-http://localhost:8081}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081}
    depends_on:
      db:
        condition: service_healthy
    expose: ["3333"]

  web:
    build:
      context: ./web
      args:
        # Vazio = MESMA origem. O cliente resolve isso para "/api" (ver web/src/lib/api/client.ts)
        # e o Caddy roteia /api/* para a API. É o alias que evita a colisão entre as páginas
        # /admin/* do Next e os endpoints /admin/* da API.
        NEXT_PUBLIC_API_URL: ""
    expose: ["5173"]

  caddy:
    image: caddy:2
    # portas 80 (PID 4/http.sys) e 8080 (PID 7088) já ocupadas no host → usar 8081/8443
    ports: ["8081:80", "8443:443"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on: [api, web]

volumes:
  dbdata:
  caddydata:
  caddyconfig: