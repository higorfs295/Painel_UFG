name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: painel
          POSTGRES_PASSWORD: painel
          POSTGRES_DB: painel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U painel"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://painel:painel@localhost:5432/painel_test?schema=public
      DIRECT_URL: postgresql://painel:painel@localhost:5432/painel_test?schema=public
      JWT_SECRET: ci-secret-please-change-me-0123456789abcdef
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: painel
          POSTGRES_PASSWORD: painel
          POSTGRES_DB: painel_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U painel"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://painel:painel@localhost:5432/painel_e2e?schema=public
      DIRECT_URL: postgresql://painel:painel@localhost:5432/painel_e2e?schema=public
      JWT_SECRET: ci-secret-please-change-me-0123456789abcdef
      E2E_USER_EMAIL: fhigor295@gmail.com
      E2E_USER_PASSWORD: ci-e2e-password-123
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Backend deps + migrate + seed
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          touch .env   # npm run seed usa --env-file=.env; as vars reais vêm do env do job
          SEED_ADMIN_PASSWORD="$E2E_USER_PASSWORD" npm run seed
      - name: Sobe a API em background
        working-directory: backend
        run: |
          nohup npx tsx src/server.ts > api.log 2>&1 &
          for i in $(seq 1 40); do curl -sf http://localhost:3333/health && break; sleep 1; done
          curl -sf http://localhost:3333/health
      - name: Frontend deps + navegador
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Testes E2E
        working-directory: frontend
        run: npm run e2e
      - name: Log da API em caso de falha
        if: failure()
        run: tail -50 backend/api.log || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
