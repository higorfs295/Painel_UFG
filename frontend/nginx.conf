# Serve o SPA com fallback para index.html (rotas do client-side router).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Defesa em profundidade (o Caddy no edge já injeta estes; mantidos caso o nginx sirva direto).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # assets com hash podem ser cacheados agressivamente
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # qualquer rota desconhecida cai no index.html (BrowserRouter)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
